<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>MyHaulStore · Console</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ===== EDIT THIS: where your backend lives ===== */
/* local dev: http://127.0.0.1:8000   prod: your deployed API URL */
</style>
<script>var API_BASE = "http://127.0.0.1:8000";</script>
<style>
:root{--bg:#0B0B0F;--panel:#14141B;--panel2:#1A1A23;--line:#24242F;--line2:#2E2E3B;--ink:#ECECF2;--muted:#9A9AA8;--faint:#6A6A77;--violet:#7C5CFF;--violet2:#A48BFF;--gold:#E9C46A;--paid:#1FB87A;--barter:#F0883E;--danger:#E2455A;--info:#4D8DFF;--r:16px;--shadow:0 18px 50px -20px rgba(0,0,0,.7)}
*{box-sizing:border-box}html,body{margin:0;height:100%}
body{background:radial-gradient(1100px 650px at 82% -8%,#18162a,transparent 55%),var(--bg);color:var(--ink);font-family:Inter,system-ui,sans-serif;font-size:14px}
h1,h2,h3,h4{font-family:'Space Grotesk';margin:0;letter-spacing:-.02em}
.num{font-variant-numeric:tabular-nums}
.btn{border:0;border-radius:11px;padding:10px 16px;font-weight:600;font-size:13px;cursor:pointer;font-family:Inter;display:inline-flex;gap:7px;align-items:center;transition:.15s}
.btn.pri{background:linear-gradient(180deg,var(--violet),#6a4ee6);color:#fff;box-shadow:0 10px 24px -10px var(--violet)}
.btn.pri:hover{filter:brightness(1.08)}
.btn.ghost{background:var(--panel);color:var(--ink);box-shadow:inset 0 0 0 1px var(--line2)}.btn.ghost:hover{background:var(--panel2)}
.btn.gold{background:linear-gradient(180deg,#f0d488,#d8b15a);color:#241c08;font-weight:700}
.btn.sm{padding:7px 12px;font-size:12px}
input,select{background:#0f0f15;border:1px solid var(--line2);color:var(--ink);border-radius:10px;padding:10px 12px;font-size:13px;outline:none;font-family:Inter;width:100%}
input:focus,select:focus{border-color:var(--violet)}
.panel{background:linear-gradient(180deg,var(--panel),#121219);border:1px solid var(--line);border-radius:var(--r);padding:20px 22px;box-shadow:var(--shadow)}
.ph{font-size:11.5px;color:var(--faint);margin:3px 0 14px}

/* login */
.login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.login .box{width:min(420px,94vw);background:linear-gradient(180deg,#14141c,#0f0f15);border:1px solid var(--line2);border-radius:20px;padding:32px;box-shadow:var(--shadow)}
.logo{width:42px;height:42px;border-radius:12px;background:conic-gradient(from 140deg,var(--violet),#c9a8ff,var(--gold),var(--violet));margin-bottom:16px}
.login h2{font-size:22px}.login .sub{color:var(--muted);font-size:13px;margin:4px 0 18px}
.login .field{margin-bottom:12px}.login label{font-size:11.5px;color:var(--muted);font-weight:600;display:block;margin-bottom:6px}
.tabsw{display:flex;gap:6px;margin-bottom:16px}.tabsw button{flex:1;background:#0f0f15;border:1px solid var(--line2);color:var(--muted);border-radius:10px;padding:9px;font-weight:600;cursor:pointer}
.tabsw button.on{background:rgba(124,92,255,.18);color:#fff;border-color:var(--violet)}
.msg{font-size:12.5px;margin-top:10px;padding:9px 12px;border-radius:9px;display:none}
.msg.err{display:block;background:rgba(226,69,90,.12);color:#ff9aa8}
.msg.ok{display:block;background:rgba(31,184,122,.12);color:#7fe3bb}

/* app shell */
.app{display:none;grid-template-columns:230px 1fr;min-height:100vh}
.side{background:linear-gradient(180deg,#101017,#0c0c12);border-right:1px solid var(--line);padding:20px 14px;display:flex;flex-direction:column;gap:4px;position:sticky;top:0;height:100vh}
.brand{display:flex;gap:10px;align-items:center;padding:6px 8px 16px}.brand b{font-size:15px}.brand span{font-size:10px;color:var(--faint);letter-spacing:.14em;text-transform:uppercase;display:block}
.nav a{display:block;padding:10px 12px;border-radius:10px;color:var(--muted);font-weight:600;font-size:13.5px;cursor:pointer}
.nav a:hover{background:#191921;color:var(--ink)}.nav a.on{background:linear-gradient(90deg,rgba(124,92,255,.2),transparent);color:#fff;box-shadow:inset 0 0 0 1px rgba(124,92,255,.3)}
.side .who{margin-top:auto;font-size:11.5px;color:var(--faint);padding:10px;border-top:1px solid var(--line)}
.main{min-width:0}.top{position:sticky;top:0;z-index:5;backdrop-filter:blur(12px);background:rgba(11,11,15,.7);border-bottom:1px solid var(--line);padding:15px 26px;display:flex;align-items:center;gap:14px}
.top h2{font-size:18px}.wrap{padding:24px 26px 60px;max-width:1240px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:13px;margin-bottom:16px}
.stat{background:linear-gradient(180deg,var(--panel),#101017);border:1px solid var(--line);border-radius:var(--r);padding:17px;position:relative;overflow:hidden}
.stat::after{content:"";position:absolute;right:-30px;top:-30px;width:90px;height:90px;border-radius:50%;background:radial-gradient(circle,rgba(124,92,255,.16),transparent 70%)}
.stat .l{font-size:10.5px;letter-spacing:.09em;text-transform:uppercase;color:var(--faint);font-weight:700}
.stat .v{font-family:'Space Grotesk';font-size:25px;margin-top:7px}.stat .m{font-size:11px;color:var(--muted);margin-top:4px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-top:14px}
.barlist{display:flex;flex-direction:column;gap:8px}.barrow{display:grid;grid-template-columns:110px 1fr 38px;gap:9px;align-items:center;font-size:12px}
.barrow .nm{color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.bar{height:8px;background:#20202a;border-radius:6px;overflow:hidden}.bar span{display:block;height:100%;background:linear-gradient(90deg,var(--violet),var(--violet2))}.ct{text-align:right;color:var(--faint);font-weight:600}
.toolbar{display:flex;gap:9px;flex-wrap:wrap;align-items:center;margin-bottom:16px}.toolbar input,.toolbar select{width:auto}
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:13px}
.card{background:linear-gradient(180deg,var(--panel),#111118);border:1px solid var(--line);border-radius:var(--r);padding:15px;cursor:pointer;transition:.15s}.card:hover{transform:translateY(-2px);border-color:var(--line2)}
.cn{font-family:'Space Grotesk';font-weight:600;font-size:14.5px}.ch{font-size:11px;color:var(--faint)}
.tags{display:flex;gap:5px;flex-wrap:wrap;margin:9px 0}.tg{font-size:10px;font-weight:600;padding:3px 7px;border-radius:6px;background:#1e1e27;color:var(--muted)}.tg.n{background:rgba(124,92,255,.16);color:var(--violet2)}.tg.t{background:rgba(233,196,106,.14);color:var(--gold)}
.row2{display:flex;gap:9px}.met{flex:1;background:#101017;border:1px solid var(--line);border-radius:9px;padding:8px 10px}.met .l{font-size:9px;text-transform:uppercase;letter-spacing:.07em;color:var(--faint);font-weight:700}.met .v{font-family:'Space Grotesk';font-size:14px;margin-top:2px}
.tbl{width:100%;border-collapse:collapse;font-size:12.5px}.tbl th{text-align:left;color:var(--faint);font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;font-weight:700;padding:9px 10px;border-bottom:1px solid var(--line)}.tbl td{padding:10px;border-bottom:1px solid var(--line)}.tbl th.n,.tbl td.n{text-align:right}.tbl tr:hover td{background:#13131a}
.pill{font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px}.pill.green{background:rgba(31,184,122,.16);color:#7fe3bb}.pill.amber{background:rgba(240,136,62,.16);color:#f6b07e}.pill.red{background:rgba(226,69,90,.16);color:#ff9aa8}.pill.gray{background:#23232e;color:var(--muted)}
.pager{display:flex;gap:8px;justify-content:center;align-items:center;margin-top:18px;color:var(--muted)}
.empty{text-align:center;padding:50px;color:var(--faint)}
.modalbg{position:fixed;inset:0;background:rgba(5,5,8,.66);backdrop-filter:blur(5px);display:none;align-items:center;justify-content:center;z-index:20;padding:20px}.modalbg.show{display:flex}
.modal{background:linear-gradient(180deg,#13131a,#0e0e14);border:1px solid var(--line2);border-radius:18px;width:min(560px,96vw);max-height:90vh;overflow:auto;box-shadow:var(--shadow)}
.mhead{padding:18px 22px;border-bottom:1px solid var(--line)}.mbody{padding:18px 22px}.f2{display:grid;grid-template-columns:1fr 1fr;gap:0 12px}.field{margin-bottom:12px}.field label{font-size:11px;color:var(--muted);font-weight:600;display:block;margin-bottom:5px}.full{grid-column:1/-1}
.mfoot{padding:14px 22px;border-top:1px solid var(--line);display:flex;gap:9px;justify-content:flex-end}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(15px);background:#1b1b24;border:1px solid var(--line2);padding:11px 17px;border-radius:11px;font-size:13px;font-weight:600;opacity:0;transition:.25s;z-index:40}.toast.show{opacity:1;transform:translateX(-50%)}
.chartwrap{height:220px}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login" id="login">
  <div class="box">
    <div class="logo"></div>
    <h2>MyHaulStore Console</h2>
    <div class="sub" id="loginSub">Sign in to your account</div>
    <div class="tabsw"><button id="tabLogin" class="on" onclick="swTab('login')">Log in</button><button id="tabReg" onclick="swTab('reg')">Create account</button></div>
    <div id="regName" class="field" style="display:none"><label>Your name</label><input id="iName" placeholder="e.g. Shivam"></div>
    <div class="field"><label>Email</label><input id="iEmail" type="email" placeholder="you@myhaulstore.com"></div>
    <div class="field"><label>Password</label><input id="iPass" type="password" placeholder="••••••••"></div>
    <button class="btn pri" style="width:100%;justify-content:center" id="authBtn" onclick="doAuth()">Log in</button>
    <div class="msg" id="authMsg"></div>
    <div class="ph" style="margin-top:14px">The very first account becomes the <b>admin</b>. New teammates must be approved by an admin before they can log in.</div>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">
  <aside class="side">
    <div class="brand"><div class="logo" style="width:32px;height:32px;margin:0"></div><div><b>MyHaulStore</b><span>Console</span></div></div>
    <nav class="nav" id="nav">
      <a data-v="dash" data-perm="creators.view" class="on">Dashboard</a>
      <a data-v="creators" data-perm="creators.view">Creators</a>
      <a data-v="exec" data-perm="executions.view">Execution</a>
      <a data-v="brands" data-perm="brands.view">Brands</a>
      <a data-v="reports" data-perm="reports.view">Reports</a>
      <a data-v="finance" data-perm="finance.view">Finance &amp; Bank</a>
      <a data-v="sheets" data-perm="sheets.manage">Sheets &amp; Sync</a>
      <a data-v="admin" data-perm="users.manage">Admin · Access</a>
    </nav>
    <div class="who" id="who"></div>
  </aside>
  <div class="main">
    <header class="top"><h2 id="vtitle">Dashboard</h2><div style="margin-left:auto"><button class="btn ghost sm" onclick="logout()">Log out</button></div></header>
    <div class="wrap" id="content"></div>
  </div>
</div>

<div class="modalbg" id="modalbg"><div class="modal" id="modal"></div></div>
<div class="toast" id="toast"></div>

<script>
const $=id=>document.getElementById(id);
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function money(n){n=+n||0;if(!n)return'—';if(n>=1e7)return'₹'+(n/1e7).toFixed(2).replace(/\.00$/,'')+' Cr';if(n>=1e5)return'₹'+(n/1e5).toFixed(2).replace(/\.00$/,'')+' L';if(n>=1e3)return'₹'+(n/1e3).toFixed(n>=1e4?0:1)+'K';return'₹'+n;}
function compact(n){n=+n||0;if(n>=1e7)return(n/1e7).toFixed(1)+'Cr';if(n>=1e5)return(n/1e5).toFixed(1)+'L';if(n>=1e3)return(n/1e3).toFixed(n>=1e4?0:1)+'K';return''+n;}
function toast(t){const e=$('toast');e.textContent=t;e.classList.add('show');clearTimeout(e._t);e._t=setTimeout(()=>e.classList.remove('show'),2300);}
let TOKEN=localStorage.getItem('mhs_token')||'';let ME=null;let charts={};let PERMS_ALL=[];
function can(p){return ME&&(ME.role==='admin'||(ME.permissions||[]).includes(p));}

async function api(path,opts={}){
  opts.headers=Object.assign({'Content-Type':'application/json'},opts.headers||{});
  if(TOKEN)opts.headers['Authorization']='Bearer '+TOKEN;
  const r=await fetch(API_BASE+path,opts);
  if(r.status===401){logout();throw new Error('Session expired');}
  const t=await r.text();let j;try{j=t?JSON.parse(t):{};}catch(e){throw new Error('Bad server response');}
  if(!r.ok)throw new Error(j.detail||('Error '+r.status));
  return j;
}

/* ---------- auth ---------- */
let mode='login';
function swTab(m){mode=m;$('tabLogin').classList.toggle('on',m==='login');$('tabReg').classList.toggle('on',m==='reg');
  $('regName').style.display=m==='reg'?'block':'none';$('authBtn').textContent=m==='reg'?'Create account':'Log in';$('authMsg').className='msg';}
function showMsg(t,ok){const m=$('authMsg');m.textContent=t;m.className='msg '+(ok?'ok':'err');}
async function doAuth(){const email=$('iEmail').value.trim(),pass=$('iPass').value;
  if(!email||!pass){showMsg('Enter email and password');return;}
  try{
    if(mode==='reg'){
      const u=await api('/api/auth/register',{method:'POST',body:JSON.stringify({email,password:pass,name:$('iName').value.trim()})});
      if(u.approved){showMsg('Admin account created! Logging you in…',true);await login(email,pass);}
      else{showMsg('Account created. An admin must approve you before you can log in.',true);swTab('login');}
    }else{await login(email,pass);}
  }catch(e){showMsg(e.message);}
}
async function login(email,pass){
  const form=new URLSearchParams();form.set('username',email);form.set('password',pass);
  const r=await fetch(API_BASE+'/api/auth/login',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:form});
  const j=await r.json();if(!r.ok)throw new Error(j.detail||'Login failed');
  TOKEN=j.access_token;localStorage.setItem('mhs_token',TOKEN);ME=j.user;enterApp();
}
function logout(){TOKEN='';ME=null;localStorage.removeItem('mhs_token');$('app').style.display='none';$('login').style.display='flex';}
async function enterApp(){
  try{ME=ME||await api('/api/auth/me');}catch(e){logout();return;}
  try{PERMS_ALL=(await api('/api/permissions')).permissions;}catch(e){PERMS_ALL=[];}
  $('login').style.display='none';$('app').style.display='grid';
  $('who').innerHTML=esc(ME.name||ME.email)+'<br><span style="color:var(--violet2)">'+ME.role+'</span>';
  // gate nav by permission
  let firstVisible=null;
  [...$('nav').children].forEach(a=>{const p=a.dataset.perm;const ok=!p||can(p);a.style.display=ok?'block':'none';if(ok&&!firstVisible)firstVisible=a;});
  [...$('nav').children].forEach(x=>x.classList.remove('on'));
  if(firstVisible){firstVisible.classList.add('on');go(firstVisible.dataset.v);}
  else $('content').innerHTML='<div class="empty">Your account has no permissions yet. Ask an admin to grant access.</div>';
}

/* ---------- nav ---------- */
$('nav').addEventListener('click',e=>{const a=e.target.closest('a[data-v]');if(!a)return;[...$('nav').children].forEach(x=>x.classList.remove('on'));a.classList.add('on');go(a.dataset.v);});
function go(v){const T={dash:'Dashboard',creators:'Creators',exec:'Execution',brands:'Brands',reports:'Reports',finance:'Finance & Bank',sheets:'Sheets & Sync',admin:'Admin · Access'};$('vtitle').textContent=T[v];
  destroyCharts();
  ({dash:renderDash,creators:renderCreators,exec:renderExec,brands:renderBrands,reports:renderReports,finance:renderFinance,sheets:renderSheets,admin:renderAdmin}[v])();}
function destroyCharts(){Object.values(charts).forEach(c=>{try{c.destroy()}catch(e){}});charts={};}
function stat(l,v,m){return `<div class="stat"><div class="l">${l}</div><div class="v num">${v}</div><div class="m">${m||''}</div></div>`;}

/* ---------- dashboard ---------- */
async function renderDash(){$('content').innerHTML='<div class="empty">Loading…</div>';
  let s;try{s=await api('/api/stats');}catch(e){return err(e);}
  const mx=Math.max(1,...s.top_niches.map(x=>x[1])),mxl=Math.max(1,...s.top_locs.map(x=>x[1]));
  $('content').innerHTML=`<div class="stats">
    ${stat('Total creators',(s.total).toLocaleString('en-IN'),'live in database')}
    ${stat('Combined reach',compact(s.reach),'sum of followers')}
    ${stat('Avg reel cost',money(s.avg_reel),'priced creators')}
    ${stat('Priced creators',(s.by_price.paid).toLocaleString('en-IN'),s.by_price.barter+' barter · '+s.by_price.open+' open')}
  </div>
  <div class="grid2">
    <div class="panel"><h3>Top niches</h3><div class="ph">Where your roster is strongest</div><div class="barlist">${s.top_niches.map(([n,c])=>`<div class="barrow"><div class="nm">${esc(n)}</div><div class="bar"><span style="width:${c/mx*100}%"></span></div><div class="ct">${c}</div></div>`).join('')||'<div class="ph">No data — import a sheet.</div>'}</div></div>
    <div class="panel"><h3>Price split</h3><div class="ph">Priced / barter / open</div><div class="chartwrap"><canvas id="cP"></canvas></div></div>
  </div>
  <div class="grid2">
    <div class="panel"><h3>Top locations</h3><div class="ph">Primary city</div><div class="barlist">${s.top_locs.map(([n,c])=>`<div class="barrow"><div class="nm">${esc(n)}</div><div class="bar"><span style="width:${c/mxl*100}%;background:linear-gradient(90deg,var(--gold),#f4dd9e)"></span></div><div class="ct">${c}</div></div>`).join('')||'<div class="ph">—</div>'}</div></div>
    <div class="panel"><h3>By tier</h3><div class="ph">Nano → Mega</div><div class="chartwrap"><canvas id="cT"></canvas></div></div>
  </div>`;
  charts.cP=new Chart($('cP'),{type:'doughnut',data:{labels:['Priced','Barter','Open'],datasets:[{data:[s.by_price.paid,s.by_price.barter,s.by_price.open],backgroundColor:['#1FB87A','#F0883E','#5b5b68'],borderWidth:0}]},options:{cutout:'64%',plugins:{legend:{position:'bottom',labels:{color:'#9A9AA8',usePointStyle:true,pointStyle:'circle',padding:13}}}}});
  charts.cT=new Chart($('cT'),{type:'bar',data:{labels:Object.keys(s.by_tier),datasets:[{data:Object.values(s.by_tier),backgroundColor:'#7C5CFF',borderRadius:6}]},options:{plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{color:'#9A9AA8'}},y:{grid:{color:'#1f1f29'},ticks:{color:'#6A6A77',precision:0}}}}});
}

/* ---------- creators ---------- */
let cq={page:1,q:'',niche:'',tier:'',price:'',sort:'followers'};
async function renderCreators(){
  $('content').innerHTML=`<div class="toolbar">
    <input id="cSearch" placeholder="Search name, niche, city…" value="${esc(cq.q)}" style="min-width:240px">
    <select id="cPrice"><option value="">All prices</option><option value="paid">Priced</option><option value="barter">Barter</option><option value="open">Open</option></select>
    <select id="cSort"><option value="followers">Followers ↓</option><option value="engagement">Engagement ↓</option><option value="reel_cost">Reel cost ↓</option><option value="name">Name A–Z</option></select>
    <button class="btn pri sm" onclick="creatorModal()">+ Add creator</button>
    <span style="margin-left:auto;color:var(--faint)" id="cCount"></span>
  </div><div class="cgrid" id="cgrid"></div><div class="pager" id="cpager"></div>`;
  $('cPrice').value=cq.price;$('cSort').value=cq.sort;
  let t=null;$('cSearch').oninput=e=>{clearTimeout(t);t=setTimeout(()=>{cq.q=e.target.value.trim();cq.page=1;loadCreators();},300);};
  $('cPrice').onchange=e=>{cq.price=e.target.value;cq.page=1;loadCreators();};
  $('cSort').onchange=e=>{cq.sort=e.target.value;loadCreators();};
  loadCreators();
}
async function loadCreators(){$('cgrid').innerHTML='<div class="empty">Loading…</div>';
  let j;try{j=await api('/api/creators?'+new URLSearchParams({page:cq.page,page_size:60,q:cq.q,price:cq.price,sort:cq.sort}));}catch(e){return err(e);}
  window.__c=Object.fromEntries(j.rows.map(r=>[r.id,r]));
  $('cCount').textContent=(j.total).toLocaleString('en-IN')+' creators';
  if(!j.rows.length){$('cgrid').innerHTML='<div class="empty">No creators. Import a sheet or add one.</div>';$('cpager').innerHTML='';return;}
  $('cgrid').innerHTML=j.rows.map(c=>`<div class="card" onclick="creatorModal(${c.id})">
    <div class="cn">${esc(c.name)}</div><div class="ch">${c.handle?'@'+esc(c.handle):'—'} · ${esc(c.platform)}</div>
    <div class="tags">${c.niche?`<span class="tg n">${esc(String(c.niche).split(/[\/,]/)[0])}</span>`:''}${c.tier?`<span class="tg t">${esc(c.tier)}</span>`:''}${c.engagement?`<span class="tg">${c.engagement}% eng</span>`:''}</div>
    <div class="row2"><div class="met"><div class="l">Followers</div><div class="v">${compact(c.followers)}</div></div><div class="met"><div class="l">Reel</div><div class="v">${money(c.reel_cost)}</div></div></div>
  </div>`).join('');
  const pages=Math.ceil(j.total/60);

function openModal(title,body,foot){$('modal').innerHTML=`<div class="mhead"><h3>${title}</h3></div><div class="mbody">${body}</div><div class="mfoot">${foot}</div>`;$('modalbg').classList.add('show');}
function closeModal(){$('modalbg').classList.remove('show');}
$('modalbg').addEventListener('click',e=>{if(e.target===$('modalbg'))closeModal();});
function err(e){$('content').innerHTML=`<div class="empty">⚠ ${esc(e.message)}<br><br><button class="btn ghost" onclick="go('dash')">Back</button></div>`;}

/* ---------- start ---------- */
if(TOKEN)enterApp();else $('login').style.display='flex';
</script>
