# Render.com blueprint — deploys the backend, always-on, in the cloud.
# (Better than a laptop that must never turn off.)
services:
  - type: web
    name: myhaulstore-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: "*"
      # Add a Postgres database in Render, then set DATABASE_URL here for big data.
      # - key: DATABASE_URL
      #   fromDatabase: { name: myhaulstore-db, property: connectionString }

# databases:
